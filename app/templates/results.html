<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도도리 - 검색 결과</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="logo"><a href="/" style="text-decoration: none; color: inherit;">🐿️ 도도리</a></div>
        </header>

        <section class="search-info">
            <p><strong>'{{ keyword }}'</strong>에 대한 검색 결과입니다.</p>
        </section>

        <!-- 실제 도서 목록이 나열될 영역 -->
        <main class="results-list" id="resultsList">
            <!-- 샘플 카드 (나중에 JS로 동적 생성) -->
            {% if books %}
            {% for book in books %}
            <div class="book-card">
                <img src="{{ book.cover_image_url }}" alt="{{ book.title }}" style="width: 100px; height: auto;">

                <div class="book-info">
                    <h3 class="book-title">{{ book.title }}</h3>
                    <p class="book-author">{{ book.author }}</p>
                </div>
            </div>
            {% endfor %}
            {% else %}
            <p>죄송합니다. '{{ keyword }}'에 대한 검색 결과가 우리 DB에 없네요! 🐿️💦</p>
            {% endif %}
        </main>
    </div>
</body>

</html>
